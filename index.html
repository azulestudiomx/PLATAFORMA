<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#8B0000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="Sistema de gestión y recopilación de información ciudadana para el estado de Campeche." />
  <title>Plataforma Ciudadana Campeche</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- Google Fonts: Outfit (Brand & UI) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <!-- Tailwind CDN with extended config -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            brand: ['Outfit', 'sans-serif'],
          },
          colors: {
            brand: {
              primary:   'var(--color-primary)',
              secondary: 'var(--color-secondary)',
              accent:    'var(--color-accent)',
              dark:      '#0F172A',
              light:     '#F8FAFC',
              slate:     '#334155',
              muted:     '#94a3b8',
            }
          },
          backgroundImage: {
            'brand-gradient':       'linear-gradient(135deg, #8B0000 0%, #4a0000 100%)',
            'brand-gradient-hover': 'linear-gradient(135deg, #a00000 0%, #5a0000 100%)',
            'subtle-glow':          'radial-gradient(circle at 50% 0%, rgba(139,0,0,0.12) 0%, transparent 70%)',
            'glass-shine':          'linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.02) 100%)',
          },
          boxShadow: {
            'glass':    '0 8px 32px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.1)',
            'card':     '0 1px 3px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.06)',
            'card-hover': '0 4px 12px rgba(0,0,0,0.08), 0 12px 32px rgba(0,0,0,0.10)',
            'glow-red': '0 0 24px rgba(139,0,0,0.3)',
            'inner':    'inset 0 2px 4px rgba(0,0,0,0.06)',
          },
          animation: {
            'slide-in-left':  'slideInLeft 0.3s ease-out',
            'slide-in-up':    'slideInUp 0.4s ease-out',
            'fade-in':        'fadeIn 0.3s ease-out',
            'pulse-soft':     'pulseSoft 2s ease-in-out infinite',
            'shimmer':        'shimmer 1.5s linear infinite',
          },
          keyframes: {
            slideInLeft: {
              from: { transform: 'translateX(-16px)', opacity: '0' },
              to:   { transform: 'translateX(0)',     opacity: '1' },
            },
            slideInUp: {
              from: { transform: 'translateY(12px)', opacity: '0' },
              to:   { transform: 'translateY(0)',    opacity: '1' },
            },
            fadeIn: {
              from: { opacity: '0' },
              to:   { opacity: '1' },
            },
            pulseSoft: {
              '0%, 100%': { opacity: '1' },
              '50%':      { opacity: '0.6' },
            },
            shimmer: {
              from: { backgroundPosition: '-200% 0' },
              to:   { backgroundPosition: '200% 0' },
            },
          },
          borderRadius: {
            '2xl': '1rem',
            '3xl': '1.5rem',
          }
        }
      }
    }
  </script>

  <style>
    /* ───── Design Token Defaults ───── */
    :root {
      --color-primary:   #8B0000;
      --color-secondary: #FFFFFF;
      --color-accent:    #FFD700;

      /* Sidebar dimensions */
      --sidebar-w: 260px;

      /* Transitions */
      --trans-fast:   120ms ease;
      --trans-base:   220ms ease;
      --trans-slow:   400ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ───── Base reset ───── */
    *, *::before, *::after { box-sizing: border-box; }

    html, body, #root {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #F1F5F9;
      color: #1e293b;
    }

    /* ───── Scrollbar ───── */
    ::-webkit-scrollbar              { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track        { background: transparent; }
    ::-webkit-scrollbar-thumb        { background: rgba(0,0,0,0.15); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover  { background: rgba(0,0,0,0.25); }

    /* ───── Sidebar glass effect ───── */
    .sidebar-glass {
      background: linear-gradient(165deg, #6e0000 0%, #3a0000 60%, #1a0000 100%);
      box-shadow: 4px 0 24px rgba(0,0,0,0.3), inset -1px 0 0 rgba(255,255,255,0.05);
    }

    /* ───── Nav item active/hover ───── */
    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      margin: 2px 12px;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      transition: background var(--trans-base), color var(--trans-base), transform var(--trans-base);
      cursor: pointer;
      text-decoration: none;
    }
    .nav-item:hover {
      background: rgba(255,255,255,0.08);
      color: #fff;
      transform: translateX(2px);
    }
    .nav-item.active {
      background: rgba(255,255,255,0.14);
      color: #fff;
      font-weight: 600;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .nav-item.active::before {
      content: '';
      position: absolute;
      left: -12px;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 24px;
      background: var(--color-accent);
      border-radius: 0 3px 3px 0;
    }
    .nav-item i {
      width: 18px;
      text-align: center;
      font-size: 0.875rem;
    }

    /* ───── Card hover lift ───── */
    .card-lift {
      transition: transform var(--trans-base), box-shadow var(--trans-base);
    }
    .card-lift:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    }

    /* ───── Stat card gradient border ───── */
    .stat-card {
      position: relative;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
    }

    /* ───── Skeleton loader ───── */
    .skeleton {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s linear infinite;
      border-radius: 8px;
    }

    /* ───── Badge pill ───── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge-green  { background: #dcfce7; color: #15803d; }
    .badge-red    { background: #fee2e2; color: #b91c1c; }
    .badge-yellow { background: #fef9c3; color: #a16207; }
    .badge-blue   { background: #dbeafe; color: #1d4ed8; }
    .badge-gray   { background: #f1f5f9; color: #475569; }
    .badge-orange { background: #ffedd5; color: #c2410c; }

    /* ───── Dot indicator ───── */
    .dot-online  { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.6); }
    .dot-offline { background: #94a3b8; }

    /* ───── Buttons ───── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--color-primary);
      color: #fff;
      font-weight: 600;
      font-size: 0.875rem;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: background var(--trans-base), transform var(--trans-fast), box-shadow var(--trans-base);
    }
    .btn-primary:hover  { background: #6e0000; box-shadow: 0 4px 16px rgba(139,0,0,0.3); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      color: #475569;
      cursor: pointer;
      transition: all var(--trans-base);
    }
    .btn-ghost:hover { background: #f1f5f9; color: #1e293b; }

    /* ───── Form inputs modern ───── */
    .input-modern {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.9rem;
      color: #1e293b;
      background: #fff;
      outline: none;
      transition: border-color var(--trans-base), box-shadow var(--trans-base);
      font-family: 'Inter', sans-serif;
    }
    .input-modern::placeholder { color: #94a3b8; }
    .input-modern:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(139,0,0,0.08);
    }

    /* ───── Page entry animation ───── */
    .page-enter {
      animation: slideInUp 0.35s ease-out both;
    }

    /* ───── Header glass ───── */
    .header-glass {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    /* ───── Mobile bottom nav ───── */
    .mobile-nav {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(0,0,0,0.07);
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
